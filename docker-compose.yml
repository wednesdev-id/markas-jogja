services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

  db:
    image: postgres:15-alpine
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: markasberjaya
      POSTGRES_DB: markas_jogja
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d markas_jogja"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default

  jm:
    image: nginx:alpine
    container_name: jm
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - default
      - wednes-proxy-net

networks:
  default:
  wednes-proxy-net:
    external: true

volumes:
  pgdata:
